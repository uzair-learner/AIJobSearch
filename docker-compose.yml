version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: visa_sponsor_jobs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/visa_sponsor_jobs
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      ADMIN_TOKEN: change-me
      ENABLE_DEMO_SEED: "true"
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  frontend:
    image: node:20
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./:/app
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_ADMIN_TOKEN: change-me
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
